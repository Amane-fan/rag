spring:
  application:
    name: rag-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5s
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  ai:
    openai:
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${BAILIAN_CHAT_MODEL:qwen-plus}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
          dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

rocketmq:
  name-server: localhost:9876
  producer:
    group: rag-platform-producer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

rag:
  auth:
    admin:
      username: admin
      password: admin
      display-name: Platform Admin
  jwt:
    secret: ChangeThisSecretKeyForProductionOnly1234567890
    ttl: PT8H
  rag:
    default-top-k: 4
    chunk-size: 500
    chunk-overlap: 100
    fallback-prefix: "[mock-answer]"
  mq:
    topics:
      document-index: rag-document-index
    consumer-groups:
      document-index: rag-document-index-group
  storage:
    oss:
      endpoint: ${OSS_ENDPOINT:}
      bucket: amane-13
      access-key-id: ${OSS_ACCESS_KEY_ID:}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
      key-prefix: ${OSS_KEY_PREFIX:document-content}
